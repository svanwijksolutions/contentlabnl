<body>
  <a href="#main" class="skip-link">Skip to content</a>
  <div id="header-placeholder"></div>

  <main id="main">
    <section class="hero">
      <div class="container contact-grid">
        <div class="contact-form-col">
          <span class="eyebrow reveal">Contact</span>
          <h1>Let's talk</h1>
          <p style="margin-bottom: 32px;">Have a question about our services, or want to schedule a free call? Fill in the form and we'll get back to you as soon as possible. Or message us directly via <a href="https://wa.me/31686392132?text=Hi%20Content%20Lab!%20I%20would%20like%20to%20know%20more%20about%20your%20services.%20Could%20you%20tell%20me%20more%3F" target="_blank" rel="noopener noreferrer" class="inline-wa">WhatsApp<span class="inline-wa-icon"><img src="/assets/icons/whatsapp.svg" alt="" width="16" height="16"></span></a>.</p>

          <form id="contact-form" class="contact-form" action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="de181cfe-2ad6-41a4-92e0-3e0b57f0c8d6">
            <input type="hidden" name="subject" value="New message via the contact form on the Content Lab website">

            <div class="form-field">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" required autocomplete="name">
            </div>
            <div class="form-field">
              <label for="email">Email address</label>
              <input type="email" id="email" name="email" required autocomplete="email">
            </div>
            <div class="form-field">
              <label for="message">Message</label>
              <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Send message</button>
            <p id="form-result" role="status" aria-live="polite"></p>
          </form>
        </div>

        <div class="contact-photo-col">
          <div class="contact-image-card reveal">
            <img src="/assets/images/content-lab-contact-tetiana.webp" alt="Get in touch with Content Lab" width="800" height="1199" loading="lazy">
          </div>
        </div>

        <div class="contact-info-bar reveal">
          <a href="mailto:tanyashpak003@gmail.com">
            <span class="contact-icon"><img src="/assets/icons/mail.svg" alt=""></span>
            tanyashpak003@gmail.com
          </a>
          <a href="tel:+31686392132">
            <span class="contact-icon"><img src="/assets/icons/phone.svg" alt=""></span>
            +31 6 86392132
          </a>
          <a href="https://wa.me/31686392132?text=Hi%20Content%20Lab!%20I%20would%20like%20to%20know%20more%20about%20your%20services.%20Could%20you%20tell%20me%20more%3F" target="_blank" rel="noopener noreferrer">
            <span class="contact-icon"><img src="/assets/icons/whatsapp.svg" alt=""></span>
            Send a WhatsApp message
          </a>
        </div>
        </div>
      </div>
    </section>
